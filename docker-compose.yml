services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slugify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slugify"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    environment:
      PORT: "9000"
      APP_NAME: slugify
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/slugify?sslmode=disable
      REDIS_URL: redis://redis:6379
      DOMAINURL: <http://localhost:9000>
      JWT_SECRET: change-me-in-production-please-use-a-long-random-string
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"

  web:
    build:
      context: ./web
    environment:
      BACKEND_URL: <http://api:9000>
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data: